<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Idm Typing Master</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <div class="container">
        <header>
            <h1 id="pageTitle">Reading Practice</h1>
            <p class="subtitle">Tập trung - Thư giãn - Phát triển</p>
        </header>

        <div class="stats">
            <div class="stat-item">
                <div class="stat-value" id="accuracy">100%</div>
                <div class="stat-label">Acc</div>
            </div>
            <div class="stat-item">
                <div class="stat-value" id="wpm">0</div>
                <div class="stat-label">WPM</div>
            </div>
            <div class="stat-item">
                <div class="stat-value" id="time">0s</div>
                <div class="stat-label">Time</div>
            </div>
            <div class="stat-item">
                <div class="stat-value" id="errors">0</div>
                <div class="stat-label">Err</div>
            </div>
        </div>

        <div class="text-display-container" id="textContainer">
            <div class="text-display" id="textDisplay">Loading...</div>
        </div>

        <div class="toolbar">
            <div class="toolbar-left settings-group">
                <div class="toggle-container" title="Chọn giao diện">
                    <select id="themeSelect" style="width: 110px; padding: 4px 8px;">
                        <option value="light">Default</option>
                        <option value="dark">Dark</option>
                        <option value="korean">Korean</option>
                        <option value="mandarin">Mandarin</option>
                        <option value="coffee">Coffee</option>
                        <option value="cyberpunk">Cyberpunk</option>
                        <option value="dracula">Dracula</option>
                        <option value="idm">Idm</option>
                    </select>
                </div>
                <div class="toggle-container" title="Âm thanh gõ phím">
                    <label class="toggle-switch">
                        <input type="checkbox" id="soundToggle" checked>
                        <span class="slider"></span>
                    </label>
                    <span>Sound</span>
                </div>
                <div class="toggle-container" title="Phát âm từ vựng">
                    <label class="toggle-switch">
                        <input type="checkbox" id="autoPronounceToggle" checked>
                        <span class="slider"></span>
                    </label>
                    <span>Speak</span>
                </div>
                <div class="toggle-container" title="Chế độ không nhìn">
                    <label class="toggle-switch">
                        <input type="checkbox" id="blindModeToggle">
                        <span class="slider"></span>
                    </label>
                    <span>Blind</span>
                </div>
                <div class="toggle-container" title="Hiện chú thích">
                    <label class="toggle-switch">
                        <input type="checkbox" id="autoTooltipToggle" checked>
                        <span class="slider"></span>
                    </label>
                    <span>Tips</span>
                </div>
                <div class="mini-volume-control hidden" id="volumeControl" title="Âm lượng đọc">
                    <input type="range" id="dictationVolume" min="0" max="5" step="0.1" value="1">
                </div>
                <div class="media-controls " id="mediaControls">
                    <button id="dictationPlayAllBtn" class="btn-media" title="Phát/Dừng (Toàn bài)">▶</button>
                </div>
                <div class="toggle-container" title="Bắt đầu / Dừng bài tập" style="margin-left: auto;">
                    <label class="toggle-switch">
                        <input type="checkbox" id="actionToggle">
                        <span class="slider"></span>
                    </label>
                    <span id="actionLabel" style="font-size: 0.9rem; margin-right: 8px;">Start</span>
                </div>
            </div>
        </div>

        <footer>
            <button id="editBtn" class="btn-icon" title="Sửa bài tập trên GitHub">✏️ Edit</button>
            <button id="shareBtn" class="btn-icon" title="Chia sẻ bài tập">🔗 Share</button>
            <button id="vocabBtn" class="btn-icon" title="Danh sách từ vựng">📝 Vocab</button>
            <input type="file" id="fileLoader" accept=".txt,.md,.json,.tsv,.mp3" hidden multiple>
            <button id="fileLoaderBtn" class="btn-icon">📂 Load</button>

            <div class="custom-dropdown" id="playlistDropdown">
                <div class="dropdown-trigger" id="playlistTrigger">
                    <span>Chọn bài tập...</span>
                    <span class="arrow">▼</span>
                </div>
                <div class="dropdown-content hidden" id="playlistContent"></div>
            </div>
            <input type="hidden" id="playlist" value="">
        </footer>
    </div>


    <div class="input-area">
        <textarea id="textInput" spellcheck="false" autocomplete="off"></textarea>
    </div>

    <div id="dictationModal" class="modal hidden">
        <div class="modal-content" style="padding: 30px; width: 400px; text-align: center;">
            <h2 style="margin-bottom: 20px;">Upload Dictation</h2>
            <div style="text-align: left; margin-bottom: 15px;">
                <label style="display:block; margin-bottom: 5px; font-size: 0.9rem; color: var(--text-muted)">1.
                    Subtitle (.txt/tsv)</label>
                <input type="file" id="dictationSubInput" accept=".txt,.tsv"
                    style="width: 100%; padding: 8px; border: 1px solid var(--border-color); border-radius: 4px; background: var(--section-bg); color: var(--text-primary);">
            </div>
            <div style="text-align: left; margin-bottom: 20px;">
                <label style="display:block; margin-bottom: 5px; font-size: 0.9rem; color: var(--text-muted)">2. Audio
                    (.mp3)</label>
                <input type="file" id="dictationAudioInput" accept="audio/*"
                    style="width: 100%; padding: 8px; border: 1px solid var(--border-color); border-radius: 4px; background: var(--section-bg); color: var(--text-primary);">
            </div>
            <div style="margin-bottom: 20px; text-align: left;">
                <label class="toggle-container">
                    <input type="checkbox" id="dictationBlindMode" style="margin-right: 8px;">
                    Blind Mode for Dictation
                </label>
            </div>
            <div style="display: flex; gap: 10px; justify-content: center;">
                <button id="dictationCancelBtn" class="btn-icon">Cancel</button>
                <button id="dictationStartBtn" class="btn-icon"
                    style="background: var(--accent-gradient); color: white; border: none;" disabled>Start
                    Dictation</button>
            </div>
        </div>
    </div>
    
    <div id="resultModal" class="modal hidden">
        <div class="modal-content" style="text-align: center;">
            <h2 style="color: var(--accent-color); margin-bottom: 10px;">🎉 Hoàn thành!</h2>
            <div class="stats-grid" style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin: 20px 0;">
                <div class="stat-box">
                    <div style="font-size: 0.9rem; color: var(--text-secondary);">Accuracy</div>
                    <div id="resAcc" style="font-size: 2rem; font-weight: bold; color: var(--correct-color);">0%</div>
                </div>
                <div class="stat-box">
                    <div style="font-size: 0.9rem; color: var(--text-secondary);">WPM</div>
                    <div id="resWpm" style="font-size: 2rem; font-weight: bold; color: var(--accent-color);">0</div>
                </div>
                <div class="stat-box">
                    <div style="font-size: 0.9rem; color: var(--text-secondary);">Time</div>
                    <div id="resTime" style="font-size: 1.5rem; font-weight: 600;">0s</div>
                </div>
                <div class="stat-box">
                    <div style="font-size: 0.9rem; color: var(--text-secondary);">Errors</div>
                    <div id="resErr" style="font-size: 1.5rem; font-weight: 600; color: var(--incorrect-color);">0</div>
                </div>
            </div>
            <div style="display: flex; gap: 10px; justify-content: center; margin-top: 20px;">
                <button id="btnReplay" class="btn-icon">↺ Luyện lại</button>
                <button id="btnNext" class="btn-icon"
                    style="background: var(--accent-gradient); color: white; border: none;">Bài tiếp theo ➔</button>
            </div>
        </div>
    </div>
    <div id="globalTooltip"></div>
    <!-- Nút nổi khi bôi đen văn bản -->
    <div id="floatingHighlightBtn" class="floating-btn hidden">
        ✨ Lưu từ
    </div>

    <!-- Modal Danh sách từ vựng -->
    <div id="vocabModal" class="modal hidden">
        <div class="modal-content"
            style="width: 450px; text-align: left; max-height: 80vh; display: flex; flex-direction: column;">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                <h2 style="margin: 0;">📝 Từ vựng đã lưu</h2>
                <button id="vocabCloseBtn" class="btn-icon" style="padding: 4px 10px;">✕</button>
            </div>

            <div class="vocab-list-container" style="overflow-y: auto; flex: 1; margin-bottom: 20px;">
                <ul id="vocabList" class="vocab-list">
                    <!-- Danh sách từ vựng sẽ được render ở đây -->
                </ul>
            </div>

            <div style="text-align: center;">
                <button id="vocabExportBtn" class="btn-icon"
                    style="background: var(--accent-gradient); color: white; border: none;">📥 Tải về (.txt)</button>
            </div>
        </div>
    </div>
    <audio id="player" class="hidden"></audio>
    <script type="module" src="scripts/app.js"></script>
</body>

</html>
